# FORTRESS.SH Configuration File v5.2
# Target: Debian / Ubuntu Server — general server (native, no Docker)
# =======================================================
# CLI arguments override these settings (when explicitly passed).
# Documentation: https://github.com/captainzero93/security_harden_linux
#
# DEPLOYMENT: Copy this file alongside fortress_improved.sh on the Debian
# machine. The script auto-loads fortress.conf from its own directory.
#   scp fortress.conf fortress_improved.sh user@passbolt-host:~/
#   sudo mv fortress.conf /path/to/fortress_improved.sh's directory
#
# POST-RUN (REQUIRED): Because ssh_hardening is disabled below, manually
# harden SSH to keep password auth while still applying strong ciphers.
# See the SSH MANUAL HARDENING note at the bottom of this file.

# ===========================
# BASIC SETTINGS
# ===========================

# High is appropriate for a server storing credentials.
# Moderate would be reasonable too if you prefer fewer potential
# disruptions — but for Passbolt, lean toward strict.
SECURITY_LEVEL="high"

# Disable interactive prompts — you're running this on a headless server.
INTERACTIVE=false

VERBOSE=false
DRY_RUN=false
EXPLAIN_MODE=false

# ===========================
# COMPATIBILITY SETTINGS
# ===========================

# No Docker on this server.
# If you ever containerize Passbolt, flip this to true.
ALLOW_DOCKER_FORWARDING=false

# No browsers run on the server itself (users hit Passbolt from their own
# machines). noexec on /dev/shm is safe here and blocks a real attack class.
ALLOW_BROWSER_SHAREDMEM=false

FORCE_DESKTOP_MODE=false
FORCE_SERVER_MODE=true

SCANNER_MODE=false

# ===========================
# MODULE CONTROL
# ===========================
#
# ssh_hardening is DISABLED because it hardcodes PasswordAuthentication=no
# with no override. Disabling it means you keep password SSH auth but lose
# cipher hardening — compensate with the manual SSH steps at the bottom.
#
# RISK ACKNOWLEDGEMENT: Password SSH auth on a credentials server is the
# weakest point of this config. Fail2ban below partially mitigates this,
# but switching to key-based auth later is strongly recommended.
#
# packages module: only removes legacy junk (telnet, rsh, nis, xinetd).
# None of those are Passbolt dependencies — safe to keep enabled.
DISABLE_MODULES="ssh_hardening"
ENABLE_MODULES=""

# ===========================
# SSH SETTINGS
# (Only applied if ssh_hardening module is enabled — it is disabled above.
#  These values are here for reference if you re-enable the module later.)
# ===========================
SSH_PORT=22
SSH_ALLOWED_USERS=""
SSH_ALLOWED_GROUPS=""
SSH_MAX_AUTH_TRIES=3
SSH_ALLOW_TCP_FORWARDING="no"
SSH_ALLOW_AGENT_FORWARDING="no"
SSH_MAX_SESSIONS=10
SSH_KBD_INTERACTIVE="no"

# ===========================
# FIREWALL SETTINGS
# ===========================

UFW_DEFAULT_INCOMING="deny"
UFW_DEFAULT_OUTGOING="allow"

# SSH (22), HTTP (80 for Let's Encrypt / redirect), HTTPS (443).
# Add any additional ports your services require.
# Outbound-only services (SMTP, etc.) need no inbound rule.
FIREWALL_ALLOW_PORTS="22,80,443"

# ===========================
# PASSWORD POLICY
# ===========================

# A password manager server should model good password hygiene.
# 16 chars minimum — up from the default 12.
PASSWORD_MIN_LENGTH=16
PASSWORD_REQUIRE_UPPERCASE=true
PASSWORD_REQUIRE_LOWERCASE=true
PASSWORD_REQUIRE_DIGITS=true
PASSWORD_REQUIRE_SPECIAL=true
# Prevent reuse of last 10 passwords (default is 5).
PASSWORD_HISTORY=10

# ===========================
# AUDIT LOGGING
# ===========================

# Extended audit trail for a server holding secrets.
# Default 50MB × 5 files = 250MB. We raise this to 100MB × 10 = 1GB.
# Adjust down if disk space is a concern.
ENABLE_AUDIT_LOGGING=true
AUDIT_MAX_LOG_FILE=100
AUDIT_NUM_LOGS=10

# ===========================
# AUTOMATIC UPDATES
# ===========================

ENABLE_AUTO_UPDATES=true

# Do NOT auto-reboot — running services would become unavailable.
# When an update requires a reboot, schedule it manually in a maintenance
# window (sudo shutdown -r 03:00, or via systemd-reboot-required check).
AUTO_REBOOT_IF_REQUIRED=false
AUTO_REBOOT_TIME="03:00"

# ===========================
# FAIL2BAN
# ===========================

# Essential here for two reasons:
#   1. SSH password auth is kept — brute force is now a real threat.
#   2. Any web login endpoints can be targeted by credential stuffing bots.
#      Add service-specific jails in /etc/fail2ban/jail.local after install
#      (e.g. nginx-http-auth, nginx-limit-req for a web server).
ENABLE_FAIL2BAN=true

# 24-hour ban (default is 1 hour — far too lenient for a credentials server).
FAIL2BAN_BANTIME=86400

# 5-minute window to accumulate failures (default 600s is fine).
FAIL2BAN_FINDTIME=300

# 5 failures triggers a ban (default is 5 — tightening it to 3 is recommended).
FAIL2BAN_MAXRETRY=5

# ===========================
# USB PROTECTION
# ===========================

# A dedicated server has no legitimate need for USB peripherals.
# Enabling this closes a physical-access vector (USB rubber ducky, etc.).
# If you need to attach a USB drive for backups, whitelist it below.
ENABLE_USB_PROTECTION=true

# To whitelist a specific backup drive: find its vendor:product with `lsusb`,
# then uncomment and fill in:
# USB_ALLOWED_DEVICES="XXXX:YYYY"
USB_ALLOWED_DEVICES=""

# ===========================
# ADVANCED / CUSTOM SYSCTL
# ===========================

# The sysctl module already applies comprehensive kernel hardening.
# These are additive — worth enabling on a public-facing web server.
SYSCTL_CUSTOM="
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1
"

# AppArmor custom profiles (fortress enables enforcement of existing profiles).
# Passbolt ships no AppArmor profile of its own; Nginx/PHP-FPM profiles from
# the distro will be enforced automatically if present.
APPARMOR_CUSTOM_PROFILES="/etc/apparmor.d/local"

# ===========================
# SSH MANUAL HARDENING NOTE
# ===========================
# Because ssh_hardening is disabled, run these steps ON THE DEBIAN HOST
# after the fortress script completes. This applies strong ciphers while
# keeping PasswordAuthentication active:
#
#   sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak
#   sudo tee /etc/ssh/sshd_config.d/99-hardened.conf > /dev/null << 'EOF'
#   PermitRootLogin no
#   PasswordAuthentication yes
#   PermitEmptyPasswords no
#   MaxAuthTries 3
#   LoginGraceTime 30
#   X11Forwarding no
#   AllowTcpForwarding no
#   AllowAgentForwarding no
#   PermitTunnel no
#   PrintLastLog yes
#   LogLevel VERBOSE
#   KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,diffie-hellman-group-exchange-sha256
#   Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
#   MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256
#   EOF
#   sudo sshd -t && sudo systemctl restart sshd
#
# This drops into /etc/ssh/sshd_config.d/ so it survives OS updates cleanly.
