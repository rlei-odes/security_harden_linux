# FORTRESS.SH Configuration File v5.2
# Target: Debian/Ubuntu desktop — general use with browser support
# =======================================================
# Balanced security that doesn't interfere with daily desktop use.
# Browsers, USB devices, and audio/video tools all keep working.
#
# CLI arguments override these settings (when explicitly passed).
# Documentation: https://github.com/captainzero93/security_harden_linux

# ===========================
# BASIC SETTINGS
# ===========================

# Moderate is the right call for desktop — high can break apps.
SECURITY_LEVEL="moderate"

# Keep prompts on — useful on a desktop where you're present.
INTERACTIVE=true

VERBOSE=false
DRY_RUN=false
EXPLAIN_MODE=false

# ===========================
# COMPATIBILITY SETTINGS
# ===========================

# Flip to true if you use Docker on this machine.
ALLOW_DOCKER_FORWARDING=false

# Required for Firefox/Chrome — JIT compilation uses /dev/shm.
# Disabling this (false) would break browsers entirely.
ALLOW_BROWSER_SHAREDMEM=true

FORCE_DESKTOP_MODE=true
FORCE_SERVER_MODE=false

SCANNER_MODE=false

# ===========================
# MODULE CONTROL
# ===========================
#
# ssh_hardening disabled: desktops rarely run an SSH server, and if they do
# you likely want password auth to remain available. Skip the module to avoid
# the key-only lockout risk on a machine you sit in front of.
#
# usb_protection disabled via ENABLE_USB_PROTECTION=false below — you need
# USB on a desktop (keyboard, mouse, drives, peripherals).
DISABLE_MODULES="ssh_hardening"
ENABLE_MODULES=""

# ===========================
# SSH SETTINGS
# (Only applied if ssh_hardening module is enabled — it is disabled above.)
# ===========================
SSH_PORT=22
SSH_ALLOWED_USERS=""
SSH_ALLOWED_GROUPS=""
SSH_MAX_AUTH_TRIES=3
SSH_ALLOW_TCP_FORWARDING="no"
SSH_ALLOW_AGENT_FORWARDING="no"
SSH_MAX_SESSIONS=10
SSH_KBD_INTERACTIVE="no"

# ===========================
# FIREWALL SETTINGS
# ===========================

UFW_DEFAULT_INCOMING="deny"
UFW_DEFAULT_OUTGOING="allow"

# No inbound ports needed for a typical desktop.
# The script will prompt interactively about KDE Connect, mDNS, Samba, etc.
# Add ports here only if you run local services (e.g. a dev server on 8080).
FIREWALL_ALLOW_PORTS=""

# ===========================
# PASSWORD POLICY
# ===========================

# Default 12 chars — reasonable for desktop use.
PASSWORD_MIN_LENGTH=12
PASSWORD_REQUIRE_UPPERCASE=true
PASSWORD_REQUIRE_LOWERCASE=true
PASSWORD_REQUIRE_DIGITS=true
PASSWORD_REQUIRE_SPECIAL=true
PASSWORD_HISTORY=5

# ===========================
# AUDIT LOGGING
# ===========================

# Smaller footprint than the server configs — desktop disk space matters.
ENABLE_AUDIT_LOGGING=true
AUDIT_MAX_LOG_FILE=50
AUDIT_NUM_LOGS=5

# ===========================
# AUTOMATIC UPDATES
# ===========================

ENABLE_AUTO_UPDATES=true

# Also false for desktop — unexpected reboots mid-work are disruptive.
AUTO_REBOOT_IF_REQUIRED=false
AUTO_REBOOT_TIME="03:00"

# ===========================
# FAIL2BAN
# ===========================

# Off on desktop — no exposed services to protect, and the overhead
# isn't worth it for a personal machine behind a router/NAT.
ENABLE_FAIL2BAN=false

FAIL2BAN_BANTIME=3600
FAIL2BAN_FINDTIME=600
FAIL2BAN_MAXRETRY=5

# ===========================
# USB PROTECTION
# ===========================

# Disabled — desktop machines need USB for peripherals, drives, etc.
ENABLE_USB_PROTECTION=false
USB_ALLOWED_DEVICES=""

# ===========================
# ADVANCED / CUSTOM SYSCTL
# ===========================

# No custom additions — the sysctl module's defaults are well-balanced
# for desktop use already (ASLR, kernel symbols, network stack hardening).
SYSCTL_CUSTOM=""

APPARMOR_CUSTOM_PROFILES="/etc/apparmor.d/local"
