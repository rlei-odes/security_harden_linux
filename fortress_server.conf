# FORTRESS.SH Configuration File v5.2
# Target: Debian / Ubuntu Server — general server (native, no Docker)
# Profile: FULL SSH HARDENING — key-based auth only
# =======================================================
# USE THIS FILE once SSH key-based authentication is working.
# Prerequisites before switching to this config:
#   1. On your Ansible controller / admin machine:
#        ssh-keygen -t ed25519 -C "ansible@passbolt"
#        ssh-copy-id user@passbolt-host
#   2. Test key login works: ssh -i ~/.ssh/id_ed25519 user@passbolt-host
#   3. Only then run: sudo ./fortress_improved.sh -c fortress_server.conf
#
# Differences from fortress.conf (password-auth profile):
#   - DISABLE_MODULES: ssh_hardening removed — module now runs in full
#   - ENABLE_FAIL2BAN: still true, now guards web endpoints (not SSH, which
#     becomes impossible to brute-force once password auth is off)
#   - SSH MANUAL HARDENING NOTE: removed — the module handles it
#   - If you previously applied the manual 99-hardened.conf drop-in, remove
#     it first: sudo rm /etc/ssh/sshd_config.d/99-hardened.conf
#
# CLI arguments override these settings (when explicitly passed).
# Documentation: https://github.com/captainzero93/security_harden_linux

# ===========================
# BASIC SETTINGS
# ===========================

SECURITY_LEVEL="high"

# Disable interactive prompts — headless server.
INTERACTIVE=false

VERBOSE=false
DRY_RUN=false
EXPLAIN_MODE=false

# ===========================
# COMPATIBILITY SETTINGS
# ===========================

ALLOW_DOCKER_FORWARDING=false
ALLOW_BROWSER_SHAREDMEM=false

FORCE_DESKTOP_MODE=false
FORCE_SERVER_MODE=true

SCANNER_MODE=false

# ===========================
# MODULE CONTROL
# ===========================
#
# ssh_hardening is now ENABLED (removed from DISABLE_MODULES).
# It will:
#   - Set PasswordAuthentication no (key-only from this point forward)
#   - Enforce strong ciphers (KexAlgorithms, Ciphers, MACs)
#   - Disable root login, X11 forwarding, TCP/agent forwarding
#   - Set MaxAuthTries, LoginGraceTime, LogLevel VERBOSE
#   - Auto-detect sftp-server path so scp/sftp keep working
#   - Validate config with sshd -t and auto-rollback on syntax error
#
# The script's interactive safety check is bypassed (INTERACTIVE=false),
# so it will apply without prompting. Make absolutely sure key auth works
# BEFORE running this — there is no second chance on a remote box.
DISABLE_MODULES=""
ENABLE_MODULES=""

# ===========================
# SSH SETTINGS
# ===========================

SSH_PORT=22
# Lock down to specific users when you have your Ansible user defined.
# Example: SSH_ALLOWED_USERS="ansible,youruser"
SSH_ALLOWED_USERS=""
SSH_ALLOWED_GROUPS=""
SSH_MAX_AUTH_TRIES=3
SSH_ALLOW_TCP_FORWARDING="no"
SSH_ALLOW_AGENT_FORWARDING="no"
SSH_MAX_SESSIONS=10
SSH_KBD_INTERACTIVE="no"

# ===========================
# FIREWALL SETTINGS
# ===========================

UFW_DEFAULT_INCOMING="deny"
UFW_DEFAULT_OUTGOING="allow"

# SSH (22), HTTP (80 for Let's Encrypt / redirect), HTTPS (443).
# Add any additional ports your services require.
FIREWALL_ALLOW_PORTS="22,80,443"

# ===========================
# PASSWORD POLICY
# ===========================

PASSWORD_MIN_LENGTH=16
PASSWORD_REQUIRE_UPPERCASE=true
PASSWORD_REQUIRE_LOWERCASE=true
PASSWORD_REQUIRE_DIGITS=true
PASSWORD_REQUIRE_SPECIAL=true
PASSWORD_HISTORY=10

# ===========================
# AUDIT LOGGING
# ===========================

ENABLE_AUDIT_LOGGING=true
AUDIT_MAX_LOG_FILE=100
AUDIT_NUM_LOGS=10

# ===========================
# AUTOMATIC UPDATES
# ===========================

ENABLE_AUTO_UPDATES=true
AUTO_REBOOT_IF_REQUIRED=false
AUTO_REBOOT_TIME="03:00"

# ===========================
# FAIL2BAN
# ===========================

# Disabled: with key-only SSH, brute force is cryptographically impossible,
# so fail2ban adds no meaningful protection for SSH. Nginx login-endpoint
# rate limiting is better handled at the application layer (Passbolt's own
# throttling) or via nginx limit_req_zone rather than an IP ban daemon.
ENABLE_FAIL2BAN=false

FAIL2BAN_BANTIME=86400
FAIL2BAN_FINDTIME=300
FAIL2BAN_MAXRETRY=5

# ===========================
# USB PROTECTION
# ===========================

ENABLE_USB_PROTECTION=true
USB_ALLOWED_DEVICES=""

# ===========================
# ADVANCED / CUSTOM SYSCTL
# ===========================

SYSCTL_CUSTOM="
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1
"

APPARMOR_CUSTOM_PROFILES="/etc/apparmor.d/local"
